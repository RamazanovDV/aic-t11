<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">Synth UI</h1>
            <div class="header-controls">
                <span id="user-info" class="user-info" style="display: none;">
                    <span id="username" style="cursor: pointer;" onclick="openProfileModal()"></span>
                </span>
                <button class="btn btn-small" id="login-btn" onclick="showLogin()">Войти</button>
                <button class="btn btn-small" id="logout-btn" onclick="logout()" style="display: none;">Выйти</button>
                <button class="btn btn-small" id="panel-mode-btn" onclick="togglePanelMode()" title="Переключить режим (одна/две панели)">
                    <span id="panel-mode-icon">⧉</span> <span id="panel-mode-text">Split</span>
                </button>
                <button class="btn btn-small" onclick="openSettings()" title="Настройки">⚙️</button>
                <span id="status" class="status-dot" title="Проверка..."></span>
            </div>
        </div>
    </header>

    <script>
        const USER_KEY = 't6_user';

        function getUser() {
            const userStr = localStorage.getItem(USER_KEY);
            return userStr ? JSON.parse(userStr) : null;
        }

        function clearUser() {
            localStorage.removeItem(USER_KEY);
            updateUserUI();
        }

        function updateUserUI() {
            const user = getUser();
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userInfo = document.getElementById('user-info');
            const username = document.getElementById('username');

            if (user) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                userInfo.style.display = 'inline';
                username.textContent = user.username;
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                userInfo.style.display = 'none';
            }
        }

        function showLogin() {
            const html = `
                <div id="login-modal" class="modal">
                    <div class="modal-content login-modal-content">
                        <button class="modal-close" onclick="closeLoginModal()">×</button>
                        <div class="login-icon">👤</div>
                        <h3>Вход в систему</h3>
                        <div class="form-group">
                            <label for="login-username">Имя пользователя</label>
                            <input type="text" id="login-username" class="form-input" placeholder="Введите имя пользователя" autofocus>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Пароль</label>
                            <input type="password" id="login-password" class="form-input" placeholder="Введите пароль">
                        </div>
                        <div id="login-error" class="error" style="display: none;"></div>
                        <div class="modal-actions">
                            <button class="btn btn-primary" onclick="login()">Войти</button>
                            <button class="btn btn-secondary" onclick="closeLoginModal()">Отмена</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
            
            document.getElementById('login-password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') login();
            });
            
            document.getElementById('login-modal').addEventListener('click', function(e) {
                if (e.target === this) closeLoginModal();
            });
        }

        function closeLoginModal() {
            const modal = document.getElementById('login-modal');
            if (modal) modal.remove();
        }

        function checkAuthAndLoad() {
            const user = getUser();
            if (!user) {
                showLogin();
                return false;
            }
            return true;
        }

        async function authFetch(url, options = {}) {
            const response = await fetch(url, options);
            if (response.status === 401) {
                clearUser();
                showLogin();
                throw new Error('Unauthorized');
            }
            return response;
        }
    </script>

    <main class="main">
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        function setUser(user) {
            localStorage.setItem(USER_KEY, JSON.stringify(user));
            updateUserUI();
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            if (!username || !password) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    setUser(data.user);
                    closeLoginModal();
                    window.location.reload();
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.error || 'Ошибка входа';
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = 'Ошибка: ' + e.message;
                errorDiv.style.display = 'block';
            }
        }

        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch (e) {
                console.error('Logout error:', e);
            }
            clearUser();
            window.location.reload();
        }

        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    const user = await response.json();
                    setUser(user);
                } else {
                    clearUser();
                }
            } catch (e) {
                clearUser();
            }
        }

        function openSettings() {
            window.location.href = '/?settings=1';
        }

        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: false,
            gfm: true
        });

        const STORAGE_KEY = 't6_session_id';

        function getSessionId() {
            return localStorage.getItem(STORAGE_KEY) || 'default';
        }

        function setSessionId(sessionId) {
            localStorage.setItem(STORAGE_KEY, sessionId);
            location.reload();
        }

        function switchSession(sessionId) {
            setSessionId(sessionId);
        }

        function togglePanelMode() {
            const currentMode = localStorage.getItem('t6_panel_mode') || 'single';
            const newMode = currentMode === 'single' ? 'dual' : 'single';
            localStorage.setItem('t6_panel_mode', newMode);
            
            const url = new URL(window.location.href);
            if (newMode === 'dual') {
                url.searchParams.set('mode', 'dual');
            } else {
                url.searchParams.delete('mode');
            }
            window.location.href = url.toString();
        }

        function updatePanelModeButton() {
            const mode = localStorage.getItem('t6_panel_mode') || 'single';
            const icon = document.getElementById('panel-mode-icon');
            const text = document.getElementById('panel-mode-text');
            if (mode === 'dual') {
                icon.textContent = '◫';
                text.textContent = 'Single';
            } else {
                icon.textContent = '⧉';
                text.textContent = 'Split';
            }
        }

        async function createNewSession() {
            const name = prompt('Введите имя новой сессии:', 'new-session');
            if (!name) return;
            
            setSessionId(name);
        }

        async function renameCurrentSession() {
            const currentSession = getSessionId();
            if (currentSession === 'default') {
                alert('Нельзя переименовать сессию default');
                return;
            }
            
            const newName = prompt('Введите новое имя сессии:', currentSession);
            if (!newName || newName === currentSession) return;
            
            try {
                const response = await fetch(`/api/sessions/${currentSession}/rename`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_name: newName })
                });
                
                if (response.ok) {
                    setSessionId(newName);
                } else {
                    const data = await response.json();
                    alert('Ошибка переименования: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                
                const select = document.getElementById('session-select');
                const currentSession = getSessionId();
                
                select.innerHTML = '';
                
                const sessions = data.sessions || [];
                sessions.forEach(session => {
                    const option = document.createElement('option');
                    option.value = session.session_id;
                    option.textContent = session.session_id;
                    if (session.session_id === currentSession) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
                
                if (!sessions.find(s => s.session_id === currentSession)) {
                    const option = document.createElement('option');
                    option.value = currentSession;
                    option.textContent = currentSession;
                    option.selected = true;
                    select.appendChild(option);
                }
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateUserUI();
            checkAuth();
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'dual') {
                localStorage.setItem('t6_panel_mode', 'dual');
            } else if (urlParams.get('mode') === 'single') {
                localStorage.setItem('t6_panel_mode', 'single');
            }
            updatePanelModeButton();
            
            fetch('/api/health')
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('status');
                    if (data.backend === 'connected') {
                        status.classList.add('connected');
                        status.title = 'Бэкенд подключён';
                    } else {
                        status.classList.add('disconnected');
                        status.title = 'Бэкенд отключён';
                    }
                })
                .catch(() => {
                    const status = document.getElementById('status');
                    status.classList.add('disconnected');
                    status.title = 'Бэкенд недоступен';
                });
        });

        async function openProfileModal(usernameToView = null) {
            const currentUser = getUser();
            const isOwnProfile = !usernameToView || usernameToView === (currentUser ? currentUser.username : null);
            
            try {
                let user;
                if (isOwnProfile) {
                    const response = await fetch('/api/profile');
                    if (!response.ok) throw new Error('Failed to load profile');
                    user = await response.json();
                } else {
                    const response = await fetch('/api/users/by-username/' + encodeURIComponent(usernameToView));
                    if (!response.ok) throw new Error('User not found');
                    user = await response.json();
                }
                
                const roleLabels = { 'user': 'Пользователь', 'admin': 'Администратор', 'viewer': 'Наблюдатель' };
                const teamRoleLabels = {
                    'developer': 'Разработчик', 'devops': 'DevOps', 'analyst': 'Аналитик',
                    'security': 'Безопасность', 'qa': 'QA', 'admin_team': 'Админ команды',
                    'manager': 'Менеджер', 'other': 'Другое'
                };
                const roleColors = { 'admin': '#e74c3c', 'user': '#3498db', 'viewer': '#95a5a6' };
                const statusColor = user.is_active ? '#27ae60' : '#e74c3c';
                const statusText = user.is_active ? 'Активен' : 'Неактивен';
                
                const html = `
                    <div id="profile-modal" class="modal" onclick="if(event.target === this) closeProfileModal()">
                        <div class="modal-content profile-modal-content">
                            <button class="modal-close" onclick="closeProfileModal()">×</button>
                            <div class="profile-header">
                                <div class="profile-avatar">${user.username.charAt(0).toUpperCase()}</div>
                                <div class="profile-title">
                                    <h3>${escapeHtml(user.username)}</h3>
                                    <span class="profile-role" style="background: ${roleColors[user.role] || '#3498db'}">${roleLabels[user.role] || user.role}</span>
                                </div>
                            </div>
                            <div class="profile-body">
                                <div class="profile-section">
                                    <div class="profile-field">
                                        <span class="profile-field-icon">📧</span>
                                        <div class="profile-field-content">
                                            <label>Email</label>
                                            ${isOwnProfile 
                                                ? `<input type="email" id="profile-email" class="form-input" value="${escapeHtml(user.email || '')}">`
                                                : `<span class="profile-field-value">${escapeHtml(user.email || 'Не указан')}</span>`
                                            }
                                        </div>
                                    </div>
                                    <div class="profile-field">
                                        <span class="profile-field-icon">👥</span>
                                        <div class="profile-field-content">
                                            <label>Роль в команде</label>
                                            ${isOwnProfile
                                                ? `<select id="profile-team-role" class="form-input">
                                                    ${Object.entries(teamRoleLabels).map(([k, v]) => `<option value="${k}" ${user.team_role === k ? 'selected' : ''}>${v}</option>`).join('')}
                                                   </select>`
                                                : `<span class="profile-field-value">${teamRoleLabels[user.team_role] || user.team_role || 'Не указана'}</span>`
                                            }
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-section">
                                    <div class="profile-field">
                                        <span class="profile-field-icon">📝</span>
                                        <div class="profile-field-content">
                                            <label>Заметки</label>
                                            ${isOwnProfile
                                                ? `<textarea id="profile-notes" class="form-input" rows="3">${escapeHtml(user.notes || '')}</textarea>`
                                                : `<span class="profile-field-value profile-notes-text">${escapeHtml(user.notes || 'Нет заметок')}</span>`
                                            }
                                        </div>
                                    </div>
                                </div>
                                ${!isOwnProfile ? `
                                <div class="profile-section profile-info-section">
                                    <div class="profile-status-row">
                                        <span class="status-indicator" style="background: ${statusColor}"></span>
                                        <span>${statusText}</span>
                                    </div>
                                    <div class="profile-status-row">
                                        <span class="status-indicator" style="background: ${user.interview_completed ? '#27ae60' : '#e74c3c'}"></span>
                                        <span>${user.interview_completed ? 'Прошёл интервью' : 'Не прошёл интервью'}</span>
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                            <div class="modal-actions profile-actions">
                                ${isOwnProfile ? `
                                    <button class="btn btn-secondary" onclick="closeProfileModal()">Отмена</button>
                                    <button class="btn btn-primary" onclick="saveProfile()">Сохранить</button>
                                ` : `
                                    <button class="btn btn-secondary" onclick="closeProfileModal()">Закрыть</button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
                
                const existingModal = document.getElementById('profile-modal');
                if (existingModal) existingModal.remove();
                
                document.body.insertAdjacentHTML('beforeend', html);
                document.getElementById('profile-modal').style.display = 'flex';
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        function closeProfileModal() {
            const modal = document.getElementById('profile-modal');
            if (modal) modal.remove();
        }

        async function saveProfile() {
            const email = document.getElementById('profile-email').value;
            const team_role = document.getElementById('profile-team-role').value;
            const notes = document.getElementById('profile-notes').value;
            
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, team_role, notes })
                });
                
                if (!response.ok) throw new Error('Failed to save');
                
                closeProfileModal();
                alert('Профиль сохранён');
            } catch (e) {
                alert('Ошибка сохранения: ' + e.message);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
