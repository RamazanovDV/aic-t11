<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">Synth UI</h1>
            <div class="header-controls">
                <span id="user-info" class="user-info" style="display: none;">
                    <span id="username"></span>
                </span>
                <button class="btn btn-small" id="login-btn" onclick="showLogin()">Войти</button>
                <button class="btn btn-small" id="logout-btn" onclick="logout()" style="display: none;">Выйти</button>
                <button class="btn btn-small" id="panel-mode-btn" onclick="togglePanelMode()" title="Переключить режим (одна/две панели)">
                    <span id="panel-mode-icon">⧉</span> <span id="panel-mode-text">Split</span>
                </button>
                <button class="btn btn-small" onclick="openSettings()" title="Настройки">⚙️</button>
                <span id="status" class="status-dot" title="Проверка..."></span>
            </div>
        </div>
    </header>

    <script>
        function openSettings() {
            window.location.href = '/?settings=1';
        }

        document.addEventListener('click', function(e) {
            if (typeof isRequestInProgress !== 'undefined' && isRequestInProgress) {
                const link = e.target.closest('.nav-link');
                if (link) {
                    e.preventDefault();
                    alert('Дождитесь ответа перед переходом');
                }
            }
        });
    </script>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script>
        const USER_KEY = 't6_user';

        function getUser() {
            const userStr = localStorage.getItem(USER_KEY);
            return userStr ? JSON.parse(userStr) : null;
        }

        function setUser(user) {
            localStorage.setItem(USER_KEY, JSON.stringify(user));
            updateUserUI();
        }

        function clearUser() {
            localStorage.removeItem(USER_KEY);
            updateUserUI();
        }

        function updateUserUI() {
            const user = getUser();
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userInfo = document.getElementById('user-info');
            const username = document.getElementById('username');

            if (user) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                userInfo.style.display = 'inline';
                username.textContent = user.username;
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                userInfo.style.display = 'none';
            }
        }

        function showLogin() {
            const html = `
                <div id="login-modal" class="modal">
                    <div class="modal-content">
                        <h3>Вход</h3>
                        <div class="form-group">
                            <label for="login-username">Имя пользователя</label>
                            <input type="text" id="login-username" class="form-input" autofocus>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Пароль</label>
                            <input type="password" id="login-password" class="form-input">
                        </div>
                        <div id="login-error" class="error" style="display: none;"></div>
                        <div class="modal-actions">
                            <button class="btn btn-secondary" onclick="closeLoginModal()">Отмена</button>
                            <button class="btn btn-primary" onclick="login()">Войти</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
            
            document.getElementById('login-password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') login();
            });
        }

        function closeLoginModal() {
            const modal = document.getElementById('login-modal');
            if (modal) modal.remove();
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            if (!username || !password) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    setUser(data.user);
                    closeLoginModal();
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.error || 'Ошибка входа';
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = 'Ошибка: ' + e.message;
                errorDiv.style.display = 'block';
            }
        }

        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch (e) {
                console.error('Logout error:', e);
            }
            clearUser();
        }

        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    const user = await response.json();
                    setUser(user);
                } else {
                    clearUser();
                }
            } catch (e) {
                clearUser();
            }
        }

        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: false,
            gfm: true
        });

        const STORAGE_KEY = 't6_session_id';

        function getSessionId() {
            return localStorage.getItem(STORAGE_KEY) || 'default';
        }

        function setSessionId(sessionId) {
            localStorage.setItem(STORAGE_KEY, sessionId);
            location.reload();
        }

        function switchSession(sessionId) {
            setSessionId(sessionId);
        }

        function togglePanelMode() {
            const currentMode = localStorage.getItem('t6_panel_mode') || 'single';
            const newMode = currentMode === 'single' ? 'dual' : 'single';
            localStorage.setItem('t6_panel_mode', newMode);
            
            const url = new URL(window.location.href);
            if (newMode === 'dual') {
                url.searchParams.set('mode', 'dual');
            } else {
                url.searchParams.delete('mode');
            }
            window.location.href = url.toString();
        }

        function updatePanelModeButton() {
            const mode = localStorage.getItem('t6_panel_mode') || 'single';
            const icon = document.getElementById('panel-mode-icon');
            const text = document.getElementById('panel-mode-text');
            if (mode === 'dual') {
                icon.textContent = '◫';
                text.textContent = 'Single';
            } else {
                icon.textContent = '⧉';
                text.textContent = 'Split';
            }
        }

        async function createNewSession() {
            const name = prompt('Введите имя новой сессии:', 'new-session');
            if (!name) return;
            
            setSessionId(name);
        }

        async function renameCurrentSession() {
            const currentSession = getSessionId();
            if (currentSession === 'default') {
                alert('Нельзя переименовать сессию default');
                return;
            }
            
            const newName = prompt('Введите новое имя сессии:', currentSession);
            if (!newName || newName === currentSession) return;
            
            try {
                const response = await fetch(`/api/sessions/${currentSession}/rename`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_name: newName })
                });
                
                if (response.ok) {
                    setSessionId(newName);
                } else {
                    const data = await response.json();
                    alert('Ошибка переименования: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                
                const select = document.getElementById('session-select');
                const currentSession = getSessionId();
                
                select.innerHTML = '';
                
                const sessions = data.sessions || [];
                sessions.forEach(session => {
                    const option = document.createElement('option');
                    option.value = session.session_id;
                    option.textContent = session.session_id;
                    if (session.session_id === currentSession) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
                
                if (!sessions.find(s => s.session_id === currentSession)) {
                    const option = document.createElement('option');
                    option.value = currentSession;
                    option.textContent = currentSession;
                    option.selected = true;
                    select.appendChild(option);
                }
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateUserUI();
            checkAuth();
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'dual') {
                localStorage.setItem('t6_panel_mode', 'dual');
            } else if (urlParams.get('mode') === 'single') {
                localStorage.setItem('t6_panel_mode', 'single');
            }
            updatePanelModeButton();
            
            fetch('/api/health')
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('status');
                    if (data.backend === 'connected') {
                        status.classList.add('connected');
                        status.title = 'Бэкенд подключён';
                    } else {
                        status.classList.add('disconnected');
                        status.title = 'Бэкенд отключён';
                    }
                })
                .catch(() => {
                    const status = document.getElementById('status');
                    status.classList.add('disconnected');
                    status.title = 'Бэкенд недоступен';
                });
        });
    </script>
</body>
</html>
