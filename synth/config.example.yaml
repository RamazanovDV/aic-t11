app:
  host: "0.0.0.0"
  port: 5000

auth:
  api_key: "your-secret-api-key"

llm:
  default_provider: "openai"
  timeout: 120
  orchestrator_timeout: 300        # 5 minutes max for orchestrator
  token_warning_percent: 80        # warn at 80% of token limit
  token_abort_percent: 95         # abort at 95% of token limit

  providers:
    openai:
      url: "https://api.openai.com/v1"
      api_key: "sk-your-openai-key"
      model: "gpt-4o-mini"

    anthropic:
      url: "https://api.anthropic.com/v1/messages"
      api_key: "sk-ant-your-anthropic-key"
      model: "claude-3-haiku-20240307"

    ollama:
      url: "http://localhost:11434/v1"
      api_key: "ollama"
      model: "llama3"

summarizer:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.3
  prompt_source: "SUMMARIZER.md"

storage:
  data_dir: "/home/eof/dev/aic/synth/data"
