app:
  host: "0.0.0.0"
  port: 5000

auth:
  api_key: "your-secret-api-key"

llm:
  default_provider: "openai"
  timeout: 120
  orchestrator_timeout: 300        # 5 minutes max for orchestrator
  token_warning_percent: 80        # warn at 80% of token limit
  token_abort_percent: 95         # abort at 95% of token limit

  providers:
    openai:
      url: "https://api.openai.com/v1"
      api_key: "sk-your-openai-key"
      model: "gpt-4o-mini"

    anthropic:
      url: "https://api.anthropic.com/v1/messages"
      api_key: "sk-ant-your-anthropic-key"
      model: "claude-3-haiku-20240307"

    ollama:
      url: "http://localhost:11434/v1"
      api_key: "ollama"
      model: "llama3"

summarizer:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.3
  prompt_source: "SUMMARIZER.md"

mcp:
  servers:
    filesystem:
      type: stdio
      command: "python"
      args: ["/path/to/mcp-filesystem/server.py"]
      env:
        ALLOWED_DIRS: "/home/user"
    brave-search:
      type: sse
      url: "http://localhost:3000/sse"

storage:
  data_dir: "/home/eof/dev/aic/synth/data"

embeddings:
  default_provider: "ollama"
  default_model: "nomic-embed-text-v2-moe:latest"

debug:
  groups:
    ANTHROPIC: INFO
    MCP: INFO
    ROUTES: WARNING
    ORCHESTRATOR: INFO
    CHAT_STREAM: WARNING
    TSM: INFO
    STORAGE: WARNING
    SCHEDULER: INFO
    INIT: INFO
    DEBUG: DEBUG

rag:
  enabled: false                 # RAG включён по умолчанию для новых сессий
  default_index: ""              # Индекс по умолчанию
  top_k: 5                      # Количество результатов для контекста

  reranker:
    enabled: false
    type: "relative"           # relative | fixed | statistical
    threshold: 0.3             # similarity threshold (0-1) для fixed
    multiplier: 1.5            # для relative: best_distance * multiplier
    std_multiplier: 2.0        # для statistical: mean + n*std
    top_k_before: 20           # fetch больше чем нужно до фильтрации
