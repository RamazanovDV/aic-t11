<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T6 AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">T6 AI</h1>
            <nav class="nav">
                <a href="/" class="nav-link">Чат</a>
                <a href="/settings" class="nav-link">Настройки</a>
            </nav>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span class="status" id="status">
                <span class="status-dot"></span>
                Проверка...
            </span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/health')
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('status');
                    if (data.backend === 'connected') {
                        status.innerHTML = '<span class="status-dot connected"></span> Бэкенд подключён';
                    } else {
                        status.innerHTML = '<span class="status-dot disconnected"></span> Бэкенд отключён';
                    }
                })
                .catch(() => {
                    document.getElementById('status').innerHTML = '<span class="status-dot disconnected"></span> Бэкенд отключён';
                });
        });
    </script>
</body>
</html>
